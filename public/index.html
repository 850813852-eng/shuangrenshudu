<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>数独 PK</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">双人手机网页对战</p>
        <h1>数独 PK</h1>
        <p class="subhead">创建房间后，把邀请码发给对手。两人做同一道题，先正确提交的人获胜。</p>
      </section>

      <section class="card" id="lobby-card">
        <div class="form-grid">
          <label>
            <span>你的昵称</span>
            <input id="player-name" maxlength="20" placeholder="例如：小王" />
          </label>
          <button id="create-room">创建房间</button>
        </div>
        <div class="join-row">
          <input id="room-code-input" maxlength="6" placeholder="输入邀请码" />
          <button id="join-room">加入房间</button>
        </div>
      </section>

      <section class="card hidden" id="game-card">
        <div class="game-hud">
          <div class="hud-side">
            <span class="difficulty-tag">PK</span>
          </div>
          <div class="hud-center">
            <span class="hud-label">错误次数：</span>
            <div class="hearts" id="self-hearts"></div>
          </div>
          <div class="hud-side hud-side-right">
            <span id="self-time">00:00</span>
          </div>
        </div>

        <div class="duel-bar">
          <div class="duel-line">
            <span class="label">房间</span>
            <strong id="room-code"></strong>
            <button id="copy-room-code" class="ghost compact">复制</button>
          </div>
          <div class="duel-line">
            <span><strong id="self-name">我方</strong> <span id="self-state">等待中</span></span>
            <span id="match-status">等待开始</span>
            <span><strong id="opponent-name">待加入</strong> <span id="opponent-state">未加入</span></span>
          </div>
          <div class="duel-line duel-meta">
            <span id="self-mistakes">剩余容错 3 次</span>
            <span id="opponent-mistakes">对手剩余容错 3 次</span>
            <span id="opponent-time">00:00</span>
          </div>
        </div>

        <div class="message" id="message-box"></div>

        <div class="board-wrap" id="board"></div>

        <div class="pad-wrap">
          <div class="pad-actions">
            <button id="undo-move" class="ghost hidden">撤回错误输入</button>
            <button id="clear-cell" class="ghost">清空当前格</button>
            <button id="reset-board" class="ghost">重置棋盘</button>
            <button id="submit-board">提交答案</button>
          </div>
          <div class="number-pad" id="number-pad"></div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
